<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cfe8f3"/>
      <stop offset="100%" stop-color="#f3fafc"/>
    </linearGradient>
    <linearGradient id="mernFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f6b7e"/>
      <stop offset="100%" stop-color="#1b4652"/>
    </linearGradient>
    <filter id="hexShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1b3a44" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1000" height="300" fill="url(#skyBg2)"/>

  <!-- honeycomb geometry: hex width 130 (flat-top), proper tessellation -->
  <!-- centers: top row y=95 at x=490,630 ; middle row y=165 at x=420,560,700 ; bottom row y=235 at x=490,630 -->

  <!-- connecting hexes (subtle, back layer) for honeycomb feel -->
  <g opacity="0.35">
    <polygon points="670,45 735,73 735,117 670,145 605,117 605,73" fill="#e3f2f6" stroke="#7fa9b6" stroke-width="2"/>
    <polygon points="810,45 875,73 875,117 810,145 745,117 745,73" fill="#e3f2f6" stroke="#7fa9b6" stroke-width="2"/>
  </g>

  <!-- MongoDB (top center) -->
  <g transform="translate(740,80)" filter="url(#hexShadow)">
    <polygon points="0,-58 50,-30 50,30 0,58 -50,30 -50,-30" fill="#ffffff" stroke="#1e3a44" stroke-width="5"/>
    <path d="M0 -26 C12 -16 14 -2 8 10 C6 15 2 20 0 24 C-2 20 -6 15 -8 10 C-14 -2 -12 -16 0 -26 Z" fill="#47a248"/>
    <line x1="0" y1="24" x2="0" y2="8" stroke="#ffffff" stroke-width="1.6"/>
    <text x="0" y="32" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" font-weight="700" fill="#1e3a44">MongoDB</text>
  </g>

  <!-- Express.js (left) -->
  <g transform="translate(645,150)" filter="url(#hexShadow)">
    <polygon points="0,-58 50,-30 50,30 0,58 -50,30 -50,-30" fill="#ffffff" stroke="#1e3a44" stroke-width="5"/>
    <text x="0" y="-6" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#1e3a44">-e-</text>
    <text x="0" y="32" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14.5" font-weight="700" fill="#1e3a44">Express.js</text>
  </g>

  <!-- React (right) -->
  <g transform="translate(835,150)" filter="url(#hexShadow)">
    <polygon points="0,-58 50,-30 50,30 0,58 -50,30 -50,-30" fill="#ffffff" stroke="#1e3a44" stroke-width="5"/>
    <circle cx="0" cy="-16" r="4" fill="#61dafb"/>
    <ellipse cx="0" cy="-16" rx="24" ry="9" fill="none" stroke="#61dafb" stroke-width="2.4"/>
    <ellipse cx="0" cy="-16" rx="24" ry="9" fill="none" stroke="#61dafb" stroke-width="2.4" transform="rotate(60 0 -16)"/>
    <ellipse cx="0" cy="-16" rx="24" ry="9" fill="none" stroke="#61dafb" stroke-width="2.4" transform="rotate(120 0 -16)"/>
    <text x="0" y="32" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a44">React</text>
  </g>

  <!-- Node.js (bottom center, hero hex) -->
  <g transform="translate(740,222)" filter="url(#hexShadow)">
    <polygon points="0,-58 50,-30 50,30 0,58 -50,30 -50,-30" fill="url(#mernFill)" stroke="#122d36" stroke-width="5"/>
    <polygon points="0,-24 15,-16 15,4 0,12 -15,4 -15,-16" fill="none" stroke="#83cd29" stroke-width="2.4"/>
    <text x="0" y="34" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">Node.js</text>
  </g>

  <!-- LEFT: name / role block -->
  <g font-family="'Segoe UI', Arial, sans-serif">
    <text x="95" y="120" font-size="36" font-weight="800" fill="#1e3a44">Sumaiya Jannat</text>
    <text x="95" y="152" font-size="18" font-weight="600" fill="#2f6b7e">Full Stack Developer</text>
    <text x="95" y="178" font-size="15" fill="#5a7a83">Student of CSE &#183; Sylhet, Bangladesh</text>

    <line x1="95" y1="196" x2="330" y2="196" stroke="#a9cdd8" stroke-width="1.5"/>

    <text x="95" y="222" font-size="13.5" fill="#3d6b78">sumaiyajannat2209@gmail.com</text>
    <text x="95" y="242" font-size="13.5" fill="#3d6b78">01533029643</text>
  </g>
</svg>
